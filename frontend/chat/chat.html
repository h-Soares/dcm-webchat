<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DCM Webchat</title>
  <link rel="stylesheet" href="chat.css" />
  <script src="chat.js" defer></script>
</head>
<body>
  <header id="main-nav">
    <h1 id="main-title">DCM Webchat</h1>
    <nav id="main-nav-links">
      <a class="nav-link" href="">Nav1</a>
      <a class="nav-link" href="">Nav2</a>
    </nav>
  </header>

  <main>
    <section class="topbar">
      <div class="topbar-left">
        <p id="welcome">Conectando...</p>
      </div>
      <div class="topbar-right">
        <p id="usersStatus"><span class="status-dot"></span>Usuários conectados: <span id="userCount">0</span></p>
        <button id="logoutBtn" type="button">Sair</button>
      </div>
    </section>

    <section class="chatbox">
      <div id="messages"></div>

      <form id="composerForm" autocomplete="off">
        <input
          name="message"
          type="text"
          maxlength="500"
          placeholder="Digite sua mensagem"
          required
        />
        <button id="messageBtn" type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <!-- Container para notificações de login -->
  <div id="notificationContainer" class="notification-container"></div>
</body>
</html>
