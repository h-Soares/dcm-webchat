<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DCM Webchat</title>
  <link rel="stylesheet" href="login/login.css" />
  <script src="login/login.js" defer></script>
</head>
<body>
  <main class="card">
    <h1>Entrar no chat</h1>
    <p>Digite suas credenciais para acessar o chat</p>

    <form id="loginForm" novalidate>
      <label for="username">Nome de usuário</label>
      <input id="username" name="username" type="text" maxlength="30" required />
      
      <label for="password">Senha</label>
      <input id="password" name="password" type="password" required />

      <button type="submit">Entrar</button>
      <p id="error"></p>
    </form>
    
    <p id="register">Não tem conta? <a href="register.html">Cadastre-se aqui</a></p>
  </main>
</body>
</html>
